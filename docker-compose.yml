services:
  mongodb:
    image: mongo:4.4.26
    container_name: ocean-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ocean-backend
    restart: always
    ports:
      - "8080:8001"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
    volumes:
      - /mnt/ocims-somisana/public-facing/:/data/
      - cache_data:/app/.cache
    depends_on:
      - mongodb

  cache-warmer:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ocean-cache-warmer
    restart: always
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
    command: python3 -c "import time, subprocess; [(subprocess.run(['python3', '-m', 'backend.cache_warmer']), time.sleep(3600)) for _ in iter(int, 1)]"
    volumes:
      - /mnt/ocims-somisana/public-facing/:/data/
      - cache_data:/app/.cache
    depends_on:
      - backend

volumes:
  mongodb_data:
    name: ocean_model_visualiser_mongodb_data
  cache_data:
    name: ocean_model_visualiser_cache_data
